{% extends "auth/_base.html" %}{% block t %}ログイン{% endblock %}
{% block body %}<div class="box">
  <h1>ログイン</h1><p class="sub">DGSS にサインインします。</p>
  {% with ms=get_flashed_messages(with_categories=true) %}{% for c,m in ms %}<div class="flash {{c}}">{{m}}</div>{% endfor %}{% endwith %}
  <form method="post">
    <label>メールアドレス</label><input type="email" name="email" required autofocus>
    <label>パスワード</label><input type="password" name="password" required>
    <button type="submit">ログイン</button>
  </form>
  <p class="alt">アカウントが無い場合は <a href="{{ url_for('auth.signup') }}">新規登録</a></p>
</div>{% endblock %}
