<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block t %}DGSS{% endblock %} — DGSS</title>
<style>
 body{font-family:system-ui,-apple-system,"Hiragino Sans",sans-serif;background:#f6f7fb;margin:0;color:#1f2937}
 .box{max-width:380px;margin:8vh auto;background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:28px}
 .box h1{font-size:20px;margin:0 0 4px}.box p.sub{color:#6b7280;font-size:13px;margin:0 0 18px}
 label{display:block;font-size:13px;margin:12px 0 4px;color:#374151}
 input[type=email],input[type=password]{width:100%;box-sizing:border-box;padding:10px;border:1px solid #d1d5db;border-radius:8px;font:inherit}
 button{width:100%;margin-top:18px;padding:11px;border:0;border-radius:8px;background:#4f46e5;color:#fff;font:inherit;font-weight:600;cursor:pointer}
 .alt{margin-top:14px;font-size:13px;text-align:center}.alt a{color:#4f46e5}
 .flash{padding:10px 12px;border-radius:8px;margin-bottom:12px;font-size:14px}
 .flash.error{background:#fee2e2;color:#991b1b}.flash.ok{background:#dcfce7;color:#166534}
 .wide{max-width:760px}
 table{width:100%;border-collapse:collapse;font-size:14px}th,td{text-align:left;padding:8px;border-bottom:1px solid #eee}
</style></head><body>
{% block body %}{% endblock %}
</body></html>
