name: データ網羅更新（毎日）

# 毎日 JST 6:00（UTC 21:00）に、全国を都道府県分割で網羅取得した完成DBを生成し、
# GitHub Release "data-latest" にアップロード → タイムスタンプ push で Render を再デプロイ。
# Render はその完成DBをダウンロードするだけ（重い取得はここ=Actionsで完結）。
# Actions は無料・実行時間にゆとりがあるため、1000回規模のAPI取得もここで安全に回せる。
on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # Release への書き込み＋タイムスタンプ push に必要

jobs:
  build-and-publish-db:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 依存導入
        run: pip install -r requirements.txt

      - name: 回帰テスト（壊れていたら中止）
        run: python test_procurement.py && python test_kkj.py

      - name: 網羅DB生成（全国・都道府県分割）
        run: python update.py --full

      - name: DBを圧縮
        run: gzip -9 -c denki_bid.db > denki_bid.db.gz && ls -lh denki_bid.db.gz

      - name: Release "data-latest" に公開（上書き）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 固定タグ data-latest が無ければ作成、あれば資産を差し替える
          gh release view data-latest >/dev/null 2>&1 \
            && gh release upload data-latest denki_bid.db.gz --clobber \
            || gh release create data-latest denki_bid.db.gz \
                 --title "最新データ（網羅版）" \
                 --notes "update.py --full が生成した全国網羅DB。Renderがビルド時に取得。"

      - name: Render 再デプロイをトリガー（タイムスタンプ push）
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .last-deploy
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-deploy
          git commit -m "chore: daily data refresh $(date -u +%Y-%m-%d)"
          git push
          echo "push完了 → Renderが再デプロイし、最新の網羅DBをダウンロードします"
